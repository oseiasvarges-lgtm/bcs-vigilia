<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Devolutiva de Atendimento — CRAV / 77ª CIPM</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a0a2e;color:#e8d8f8;min-height:100vh}

    .header{background:linear-gradient(135deg,#2d0a4a,#1a0a2e);padding:20px 20px 16px;border-bottom:1px solid #7c3aed44;text-align:center}
    .header .logos{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px}
    .header .badge{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .badge-crav{background:#2d0a4a;border:2px solid #a855f7}
    .badge-bcs{background:#0a1a2e;border:2px solid #60a5fa}
    .header h1{font-size:16px;font-weight:700;color:#e9d5ff;letter-spacing:.5px}
    .header p{font-size:12px;color:#a78bfa88;margin-top:3px}

    .caso-banner{background:#2d0a4a;border:1px solid #7c3aed55;border-radius:10px;padding:14px 16px;margin:16px;display:flex;align-items:center;gap:10px}
    .caso-banner .ico{font-size:24px}
    .caso-banner .info{flex:1}
    .caso-banner .nome{font-size:15px;font-weight:700;color:#e9d5ff}
    .caso-banner .meta{font-size:11px;color:#a78bfa88;margin-top:2px}

    .form-wrap{padding:0 16px 32px}
    .section{background:#2d1547;border:1px solid #7c3aed33;border-radius:12px;padding:16px;margin-bottom:14px}
    .section h2{font-size:11px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #7c3aed22}

    label.field{display:block;margin-bottom:12px}
    label.field span{display:block;font-size:12px;color:#c4b5fd;margin-bottom:5px;font-weight:600}
    input[type=text],input[type=date],input[type=email],textarea,select{
      width:100%;background:#1a0a2e;border:1px solid #7c3aed55;color:#e8d8f8;
      padding:11px 13px;border-radius:8px;font-size:14px;outline:none;
      transition:border-color .2s;appearance:none;-webkit-appearance:none
    }
    input:focus,textarea:focus,select:focus{border-color:#a855f7}
    textarea{resize:vertical;min-height:90px;line-height:1.5}
    select option{background:#2d1547}
    ::placeholder{color:#7c3aed66}

    .checks-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    @media(max-width:360px){.checks-grid{grid-template-columns:1fr}}
    .check-item{background:#1a0a2e;border:1px solid #7c3aed44;border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
    .check-item:has(input:checked){background:#2d0a4a;border-color:#a855f7}
    .check-item input[type=checkbox]{width:16px;height:16px;accent-color:#a855f7;flex-shrink:0;cursor:pointer}
    .check-item .lbl{font-size:13px;color:#d4b8f8;cursor:pointer;user-select:none}

    .check-full{grid-column:1/-1}

    .situacao-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .sit-btn{background:#1a0a2e;border:2px solid #7c3aed44;border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s}
    .sit-btn input[type=radio]{display:none}
    .sit-btn .ico{font-size:22px;display:block;margin-bottom:4px}
    .sit-btn .txt{font-size:11px;font-weight:600;color:#a78bfa}
    .sit-btn:has(input:checked){border-color:#a855f7;background:#2d0a4a}
    .sit-btn:has(input:checked) .txt{color:#e9d5ff}

    .btn-submit{width:100%;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;padding:16px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.3px;margin-top:6px;transition:opacity .2s}
    .btn-submit:hover{opacity:.9}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed}

    #status{display:none;text-align:center;padding:24px 16px;border-radius:12px;margin:16px;font-size:15px;font-weight:600}
    #status.ok{background:#0a2e0a;border:1px solid #22c55e44;color:#86efac}
    #status.err{background:#2e0a0a;border:1px solid #ef444444;color:#fca5a5}

    .required{color:#a855f7}
    .hint{font-size:11px;color:#7c3aed88;margin-top:4px}
  </style>
</head>
<body>

<div class="header">
  <div class="logos">
    <div class="badge badge-crav">💜</div>
    <div style="text-align:left">
      <div style="font-size:10px;color:#a78bfa88;letter-spacing:1px;text-transform:uppercase">Devolutiva de Atendimento</div>
    </div>
    <div class="badge badge-bcs">🛡</div>
  </div>
  <h1>CRAV → 77ª CIPM BCS</h1>
  <p>Centro de Referência Albertina Vasconcelos · Nova Cidade</p>
</div>

<div id="caso-banner" style="display:none" class="caso-banner">
  <div class="ico">👩</div>
  <div class="info">
    <div class="nome" id="banner-nome">—</div>
    <div class="meta" id="banner-meta">—</div>
  </div>
</div>

<div id="status"></div>

<div class="form-wrap" id="form-area">
  <form id="form-dev" onsubmit="enviar(event)">

    <!-- Identificação -->
    <div class="section">
      <h2>📋 Identificação da Assistida</h2>
      <label class="field">
        <span>Nome completo <span class="required">*</span></span>
        <input type="text" id="f-nome" placeholder="Nome da assistida" required autocomplete="off"/>
      </label>
      <label class="field">
        <span>Nº do Protocolo / BO / Ocorrência BCS</span>
        <input type="text" id="f-protocolo" placeholder="Ex: BO 2025/1234 ou ID do caso"/>
        <div class="hint">Informe o número recebido da 77ª CIPM</div>
      </label>
      <label class="field">
        <span>Data do atendimento <span class="required">*</span></span>
        <input type="date" id="f-data" required/>
      </label>
    </div>

    <!-- Tipo de Atendimento -->
    <div class="section">
      <h2>🩺 Tipo de Atendimento Realizado</h2>
      <div class="checks-grid">
        <label class="check-item"><input type="checkbox" value="Busca ativa" name="tipo"><span class="lbl">🔍 Busca ativa</span></label>
        <label class="check-item"><input type="checkbox" value="Atendimento jurídico" name="tipo"><span class="lbl">⚖️ Jurídico</span></label>
        <label class="check-item"><input type="checkbox" value="Atendimento psicológico" name="tipo"><span class="lbl">🧠 Psicológico</span></label>
        <label class="check-item"><input type="checkbox" value="Atendimento social" name="tipo"><span class="lbl">🤝 Social</span></label>
        <label class="check-item"><input type="checkbox" value="Encaminhamento" name="tipo"><span class="lbl">📤 Encaminhamento</span></label>
        <label class="check-item"><input type="checkbox" value="Curso / capacitação" name="tipo"><span class="lbl">📚 Curso / capacitação</span></label>
        <label class="check-item"><input type="checkbox" value="Acolhimento institucional" name="tipo"><span class="lbl">🏠 Acolhimento</span></label>
        <label class="check-item"><input type="checkbox" value="Casa abrigo" name="tipo"><span class="lbl">🔒 Casa abrigo</span></label>
        <label class="check-item check-full"><input type="checkbox" value="Renovação de medida protetiva" name="tipo"><span class="lbl">🛡 Renovação de medida protetiva</span></label>
      </div>
      <label class="field" style="margin-top:12px">
        <span>Encaminhamentos / especificações</span>
        <input type="text" id="f-encaminhamento" placeholder="Ex: encaminhada ao CAPS, curso de informática no SENAC..."/>
      </label>
    </div>

    <!-- Situação atual -->
    <div class="section">
      <h2>📍 Situação Atual</h2>
      <div class="situacao-grid">
        <label class="sit-btn"><input type="radio" name="situacao" value="Protegida / segura"><span class="ico">✅</span><span class="txt">Protegida / Segura</span></label>
        <label class="sit-btn"><input type="radio" name="situacao" value="Em situação de risco"><span class="ico">⚠️</span><span class="txt">Em risco</span></label>
        <label class="sit-btn"><input type="radio" name="situacao" value="Não localizada"><span class="ico">🔍</span><span class="txt">Não localizada</span></label>
        <label class="sit-btn"><input type="radio" name="situacao" value="Situação desconhecida"><span class="ico">❓</span><span class="txt">Desconhecida</span></label>
      </div>
    </div>

    <!-- Observações -->
    <div class="section">
      <h2>📝 Observações</h2>
      <label class="field">
        <span>Relato do atendimento</span>
        <textarea id="f-obs" placeholder="Descreva como foi o atendimento, situação encontrada, ações realizadas, próximos passos..."></textarea>
      </label>
    </div>

    <!-- Técnica -->
    <div class="section">
      <h2>👤 Técnica Responsável</h2>
      <label class="field">
        <span>Nome completo <span class="required">*</span></span>
        <input type="text" id="f-tecnica" placeholder="Sua identificação profissional" required/>
      </label>
      <label class="field">
        <span>Função / área</span>
        <select id="f-funcao">
          <option value="">Selecione...</option>
          <option>Assistente Social</option>
          <option>Psicóloga</option>
          <option>Advogada</option>
          <option>Educadora Social</option>
          <option>Coordenadora</option>
          <option>Outro</option>
        </select>
      </label>
    </div>

    <button type="submit" class="btn-submit" id="btn-submit">💜 Enviar Devolutiva</button>
  </form>
</div>

<script>
  const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxKZVJcjgBSVUK7MXcH1ZuKY8-YhmidlTN-olcmLJ0T4ar9fPE05-iZbqJ4KUfHMgovRA/exec";
  const TOKEN = "bcs-token-secreto-2025";

  // Lê parâmetros da URL
  var params = new URLSearchParams(location.search);
  var ocId    = params.get("oc")     || "";
  var nomePre = params.get("nome")   || "";
  var bairro  = params.get("bairro") || "";
  var ref     = params.get("ref")    || "";   // nº do BO/protocolo

  // Preenche banner se vier com dados
  if(nomePre){
    document.getElementById("caso-banner").style.display = "flex";
    document.getElementById("banner-nome").textContent = decodeURIComponent(nomePre);
    var metaParts = [];
    if(ref)    metaParts.push("Ref: "+decodeURIComponent(ref));
    if(bairro) metaParts.push(decodeURIComponent(bairro));
    if(ocId)   metaParts.push("ID: "+ocId);
    document.getElementById("banner-meta").textContent = metaParts.join(" · ") || "Caso encaminhado pela 77ª CIPM";
    document.getElementById("f-nome").value = decodeURIComponent(nomePre);
    if(ref) document.getElementById("f-protocolo").value = decodeURIComponent(ref);
  }

  // Data de hoje como padrão
  document.getElementById("f-data").value = new Date().toISOString().slice(0,10);

  function mostrarStatus(ok, msg){
    var el = document.getElementById("status");
    el.className = "status " + (ok ? "ok" : "err");
    el.textContent = msg;
    el.style.display = "block";
    if(ok) document.getElementById("form-area").style.display = "none";
    el.scrollIntoView({behavior:"smooth", block:"center"});
  }

  function enviar(e){
    e.preventDefault();
    var tipos = Array.from(document.querySelectorAll('input[name="tipo"]:checked')).map(function(c){return c.value;});
    if(!tipos.length){ alert("Selecione pelo menos um tipo de atendimento."); return; }
    var situacao = (document.querySelector('input[name="situacao"]:checked')||{value:""}).value;
    if(!situacao){ alert("Informe a situação atual da assistida."); return; }

    var reg = {
      id:           "dev_"+(Date.now())+Math.random().toString(36).slice(2,6),
      ocorrenciaId: ocId,
      nome:         document.getElementById("f-nome").value.trim(),
      protocolo:    document.getElementById("f-protocolo").value.trim(),
      data:         document.getElementById("f-data").value,
      tipos:        tipos,
      tiposTexto:   tipos.join(", "),
      encaminhamento: document.getElementById("f-encaminhamento").value.trim(),
      situacao:     situacao,
      observacoes:  document.getElementById("f-obs").value.trim(),
      tecnica:      document.getElementById("f-tecnica").value.trim(),
      funcao:       document.getElementById("f-funcao").value,
      origem:       "crav",
      timestamp:    new Date().toISOString()
    };

    var btn = document.getElementById("btn-submit");
    btn.disabled = true;
    btn.textContent = "⏳ Enviando...";

    // Envia via JSONP (mesmo padrão do IARA)
    var cb = "crav_cb_" + Date.now();
    var s  = document.createElement("script");
    var ok = false;
    var t  = setTimeout(function(){
      if(ok) return;
      s.remove();
      delete window[cb];
      // Tenta salvar localmente como fallback
      try{ localStorage.setItem("crav_pendente_"+reg.id, JSON.stringify(reg)); }catch(err){}
      mostrarStatus(false, "⚠️ Não foi possível conectar ao servidor. Sua devolutiva foi salva localmente. Por favor, tente novamente mais tarde ou entre em contato com a 77ª CIPM.");
      btn.disabled = false;
      btn.textContent = "💜 Tentar novamente";
    }, 12000);

    window[cb] = function(res){
      ok = true;
      clearTimeout(t);
      s.remove();
      delete window[cb];
      mostrarStatus(true, "✅ Devolutiva enviada com sucesso!\n\nObrigada, " + reg.tecnica + ". O registro de " + reg.nome + " foi atualizado no sistema da 77ª CIPM BCS.");
    };

    s.src = SHEETS_URL
      + "?acao=salvar&tipo=devolutivas_crav"
      + "&dados=" + encodeURIComponent(JSON.stringify(reg))
      + "&token=" + TOKEN
      + "&callback=" + cb;
    document.head.appendChild(s);
  }
</script>
</body>
</html>

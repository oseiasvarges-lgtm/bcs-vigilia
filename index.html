<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Central de Inteligências BCS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#2c2a1e;color:#e8e0cc;min-height:100vh;}
input,select,textarea,button{font-family:inherit;outline:none;}
button{cursor:pointer;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#7a7050;border-radius:3px;}
.spin{width:20px;height:20px;border:3px solid #6b6240;border-top-color:#c8a84b;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;}
.hidden{display:none!important;}
@media print{.np{display:none!important}}

/* Layout */
#app{min-height:100vh;}
#sidebar{width:220px;background:#1e1c12;border-right:1px solid #3a3820;padding:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto;}
.sidebar-header{padding:20px 14px 16px;border-bottom:1px solid #3a3820;margin-bottom:8px;}
#main{margin-left:220px;padding:28px;min-height:100vh;background:#2c2a1e;}

.nav-btn{background:transparent;border:1px solid transparent;color:#9a9070;padding:9px 14px;border-radius:7px;font-size:13px;font-weight:400;display:flex;align-items:center;gap:9px;width:100%;text-align:left;margin-bottom:2px;transition:all 0.15s;}
.nav-btn.active{background:rgba(200,168,75,0.15);border-color:rgba(200,168,75,0.35);color:#c8a84b;font-weight:600;}
.nav-btn:hover{background:rgba(200,168,75,0.08);color:#c8a84b;}
.nav-sep{border-top:1px solid #3a3820;margin:10px 14px;}
.nav-label{font-size:10px;color:#5a5535;letter-spacing:2px;padding:4px 14px 4px;text-transform:uppercase;}
.nav-section{padding:0 6px;}

/* Cards */
.card{background:#242214;border:1px solid #3a3820;border-radius:12px;padding:18px 20px;}
.stat-card{background:#242214;border:1px solid #3a3820;border-radius:12px;padding:16px 18px;}
.stat-icon{font-size:22px;margin-bottom:6px;}
.stat-val{font-size:28px;font-weight:700;line-height:1;}
.stat-label{font-size:12px;color:#7a7050;margin-top:4px;}

/* Forms */
.field{margin-bottom:14px;}
.field label{display:block;color:#7a7050;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;background:#1a1808;border:1px solid #4a4530;color:#e8e0cc;padding:10px 13px;border-radius:8px;font-size:14px;transition:border-color 0.2s;}
.field textarea{resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#c8a84b;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* Buttons */
.btn{border:none;padding:12px 18px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;}
.btn:hover{filter:brightness(1.1);}
.btn:active{transform:scale(0.98);}
.btn-gold{background:linear-gradient(135deg,#c8a84b,#a8882b);color:#1a1808;}
.btn-red{background:#b03030;color:#fff;}
.btn-green{background:#2d7a5a;color:#fff;}
.btn-blue{background:#5a7a3a;color:#fff;}
.btn-purple{background:#7a5a2a;color:#fff;}
.btn-ghost{background:#2a2818;border:1px solid #4a4530;color:#a0906a;}
.btn-full{width:100%;justify-content:center;}
.btn-sm{padding:7px 14px;font-size:12px;}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:0.3px;}

/* Ocorrência row */
.oc-row{background:#1e1c12;border:1px solid #3a3820;border-radius:10px;padding:14px 16px;margin-bottom:8px;transition:border-color 0.2s;}
.oc-row:hover{border-color:#5a5535;}
.oc-row.reinc{border-color:#c8601a;border-left:3px solid #c8601a;}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:13px 22px;border-radius:10px;font-weight:600;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;backdrop-filter:blur(8px);}

/* Login */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1e1c12 0%,#2c2a1e 50%,#1a1808 100%);}
.login-box{width:100%;max-width:420px;}
.pin-input{width:100%;background:#1a1808;border:2px solid #4a4530;color:#e8e0cc;padding:14px;border-radius:12px;font-size:28px;text-align:center;letter-spacing:12px;margin-bottom:16px;transition:border-color 0.2s;}
.pin-input:focus{border-color:#c8a84b;}
.login-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.login-btn{background:#242214;border:1px solid #4a4530;color:#e8e0cc;padding:14px;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.2s;}
.login-btn:hover{border-color:#c8a84b;color:#c8a84b;}
.login-btn.gold{background:rgba(200,168,75,0.1);border-color:rgba(200,168,75,0.4);color:#c8a84b;}

/* Alert */
.alert-box{background:#1a0a0a;border:2px solid #b03030;border-radius:16px;padding:28px;margin-bottom:20px;}

/* Chat */
.chat-msg{display:flex;margin-bottom:10px;}
.chat-msg.user{justify-content:flex-end;}
.chat-bubble{max-width:78%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.7;white-space:pre-wrap;}
.chat-bubble.assistant{background:#242214;border:1px solid #3a3820;border-radius:14px 14px 14px 4px;}
.chat-bubble.user{background:#2a2010;border:1px solid #5a4820;border-radius:14px 14px 4px 14px;}
.chat-label{font-size:10px;color:#c8a84b;font-weight:700;letter-spacing:1px;margin-bottom:6px;}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-day{background:#1a1808;min-height:72px;padding:6px 5px;cursor:pointer;border:1px solid #2a2818;transition:background 0.15s;}
.cal-day:hover{background:#242214;}
.cal-day.today .cal-num{color:#c8a84b;font-weight:700;}
.cal-day.selected{background:#242214;border-color:#5a5535;}
.cal-num{font-size:11px;margin-bottom:3px;color:#5a5535;}
.cal-event{border-radius:3px;padding:2px 4px;font-size:9px;font-weight:700;overflow:hidden;white-space:nowrap;margin-bottom:2px;}
.cal-header-day{padding:9px 0;text-align:center;font-size:11px;color:#5a5535;font-weight:600;background:#141208;}

/* Painel operacional */
.painel-op{background:linear-gradient(135deg,#1a1208 0%,#1e1a0a 100%);border:1px solid #5a4a1a;border-radius:14px;padding:0;margin-bottom:22px;overflow:hidden;}
.painel-header{background:linear-gradient(90deg,#2a1a08,#1a1208);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #4a3a18;}
.painel-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:pulse 2s infinite;display:inline-block;margin-right:6px;}
.painel-section{padding:14px 16px;border-bottom:1px solid #3a3020;}
.painel-section:last-child{border-bottom:none;}
.painel-section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.intel-card{background:#0e0c06;border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid transparent;}
.intel-card:last-child{margin-bottom:0;}
@media(max-width:768px){
  #sidebar{transform:translateX(-100%);width:82vw;max-width:280px;z-index:200;}
  #sidebar.open{transform:translateX(0);}
  #main{margin-left:0!important;padding:14px 12px 80px!important;}
  #mobile-nav-bar{display:flex!important;}
  .grid2{grid-template-columns:1fr!important;}
  .grid3{grid-template-columns:1fr!important;}
}
#sidebar{transition:transform 0.25s ease;}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199;}
#sidebar-overlay.open{display:block;}
#mobile-nav-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#1e1c12;border-top:1px solid #3a3820;z-index:150;padding:8px 4px 12px;gap:0;align-items:center;}
.mob-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;color:#5a5535;padding:6px 2px;cursor:pointer;border-radius:8px;font-family:inherit;}
.mob-btn.active{color:#c8a84b;}
.mob-btn span{font-size:20px;line-height:1;}
.mob-btn p{font-size:9px;font-weight:600;}
.mob-menu-btn{width:40px;height:40px;background:rgba(200,168,75,0.15);border:1px solid rgba(200,168,75,0.3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;margin-left:4px;}
#mapa-leaflet{height:100%;width:100%;}
.leaflet-container{background:#1a1808;}
@keyframes pulsar{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.8);}}
@keyframes pulsarAnel{0%{opacity:0.8;transform:scale(1);}100%{opacity:0;transform:scale(3);}}
.marcador-crime{position:relative;display:flex;align-items:center;justify-content:center;}
.marcador-crime .ponto{border-radius:50%;animation:pulsar 1.5s infinite;}
.marcador-crime .anel{position:absolute;border-radius:50%;animation:pulsarAnel 1.5s infinite;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxHm7LDalY1Ooln-GUQ2jsiuAkv8bS_HIIGGPLrUoTYSAcr-EbM4woEHbJvuqIS_Yfr_w/exec";
const GESTOR_PIN = "1234";
const OP_PIN = "0000";
const ANTHROPIC_KEY = ""; // Deixe vazio - o sistema funciona sem IA
const TIPOS_VISITA = ["Visita Solidária","Visita Comunitária","Visita Institucional Comunitária","Visita a Vítima de Violência","Visita de Acompanhamento"];
const COR_VISITA = {"Visita Solidária":"#c8a84b","Visita Comunitária":"#b87333","Visita Institucional Comunitária":"#c4833a","Visita a Vítima de Violência":"#ef4444","Visita de Acompanhamento":"#10b981"};
const CONCEITO_VISITA = {"Visita Solidária":"🤝 Apoio emocional e orientação a vítimas. Foco na escuta ativa e encaminhamentos.","Visita Comunitária":"🏘 Presença institucional para fortalecer laços comunitários.","Visita Institucional Comunitária":"🏛 Articulação com CRAS, CREAS, UBS e escolas (teoria do crescimento comunitário).","Visita a Vítima de Violência":"🛡 Acompanhamento de vítimas e verificação de medidas protetivas.","Visita de Acompanhamento":"🔄 Seguimento de casos anteriores."};

// ══════════════════════════════════════════════════
// PERSISTÊNCIA LOCAL
// ══════════════════════════════════════════════════
function salvarLocal() {
  try {
    const light={atendimentos:state.db.atendimentos,visitas:state.db.visitas,agendamentos:state.db.agendamentos};
    localStorage.setItem("bcs_db_light",JSON.stringify(light));
  } catch(e){}
}
function carregarLocal() {
  try {
    localStorage.removeItem("bcs_db");
    const saved=localStorage.getItem("bcs_db_light");
    if(saved){const l=JSON.parse(saved);return{ocorrencias:[],atendimentos:l.atendimentos||[],visitas:l.visitas||[],agendamentos:l.agendamentos||[]};}
  } catch(e){}
  return{ocorrencias:[],atendimentos:[],visitas:[],agendamentos:[]};
}

let _carregando = false;

// JSONP completamente isolado do DOM — usa document.head fixo, não depende de render()
function _jsonpPagina(pagina) {
  return new Promise(function(resolve){
    const cb = "bcs_cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
    const s = document.createElement("script");
    let done = false;

    const timer = setTimeout(function(){
      if(done) return; done = true;
      try{ delete window[cb]; }catch(e){}
      try{ if(s.parentNode) s.parentNode.removeChild(s); }catch(e){}
      console.log("[BCS] timeout pag"+pagina);
      resolve(null);
    }, 45000);

    window[cb] = function(rj){
      if(done) return; done = true;
      clearTimeout(timer);
      try{ delete window[cb]; }catch(e){}
      try{ if(s.parentNode) s.parentNode.removeChild(s); }catch(e){}
      resolve(rj);
    };

    s.onerror = function(){
      if(done) return; done = true;
      clearTimeout(timer);
      try{ delete window[cb]; }catch(e){}
      try{ if(s.parentNode) s.parentNode.removeChild(s); }catch(e){}
      console.log("[BCS] erro script pag"+pagina);
      resolve(null);
    };

    // Sempre usa document.head — nunca é destruído pelo render()
    s.src = SHEETS_URL + "?acao=ler&pagina=" + pagina + "&callback=" + cb;
    document.head.appendChild(s);
  });
}

function _setStatus(html){
  document.querySelectorAll("#sheets-status").forEach(function(d){ d.innerHTML = html; });
}

// Filtra linhas de cabeçalho/lixo da planilha
function _isOcValida(o){
  if(!o || typeof o !== "object") return false;
  const id = String(o.id || "").trim();
  // Rejeita linhas de cabeçalho e entradas sem ID real
  if(!id || id === "ID" || id.length > 60) return false;
  // Rejeita se não tem nenhum campo real preenchido
  if(!o.tipo && !o.bairro && !o.vitima_nome && !o.data) return false;
  return true;
}

async function carregarDoSheets() {
  if(_carregando){ console.log("[BCS] já carregando, ignorando chamada dupla"); return; }
  _carregando = true;
  _setStatus("<span style='color:#6a5a30'>Conectando...</span>");

  try {
    // ── Página 0 ──
    const rj0 = await _jsonpPagina(0);
    if(!rj0 || !rj0.ok || !rj0.dados){
      _setStatus("<span style='color:#ef4444'>⚠ Falha ao conectar</span>");
      _carregando = false; return;
    }

    if((rj0.dados.atendimentos||[]).length) state.db.atendimentos = rj0.dados.atendimentos;
    if((rj0.dados.visitas||[]).length)      state.db.visitas       = rj0.dados.visitas;
    if((rj0.dados.agendamentos||[]).length) state.db.agendamentos  = rj0.dados.agendamentos;

    const totalReal   = rj0.total || 0;
    const totalPaginas = totalReal > 0 ? Math.ceil(totalReal / 1500) : 10;
    let todasOcs = (rj0.dados.ocorrencias || []).filter(_isOcValida);

    console.log("[BCS] pag0: "+todasOcs.length+" válidas | total servidor: "+totalReal);
    _setStatus("<span style='color:#6a5a30'>"+todasOcs.length+(totalReal?"/"+totalReal:"")+" carregadas...</span>");

    // ── Páginas 1..N ──
    const temMais = rj0.temMais !== undefined ? rj0.temMais : (rj0.total > todasOcs.length);
    if(temMais || totalReal > todasOcs.length){
      for(let p = 1; p < Math.min(totalPaginas, 20); p++){
        _setStatus("<span style='color:#6a5a30'>Pág "+(p+1)+"/"+totalPaginas+" · "+todasOcs.length+(totalReal?"/"+totalReal:"")+"...</span>");

        let rjP = null;
        for(let tentativa = 0; tentativa < 3; tentativa++){
          rjP = await _jsonpPagina(p);
          if(rjP && rjP.ok && rjP.dados && (rjP.dados.ocorrencias||[]).length > 0) break;
          console.log("[BCS] pag"+p+" tentativa "+(tentativa+1)+" falhou, aguardando...");
          await new Promise(function(r){ setTimeout(r, 2000); });
        }

        const novas = rjP && rjP.ok && rjP.dados ? (rjP.dados.ocorrencias||[]).filter(_isOcValida) : [];
        console.log("[BCS] pag"+p+": "+novas.length+" válidas");

        if(!novas.length){ console.log("[BCS] pag"+p+" vazia, encerrando loop"); break; }

        todasOcs = todasOcs.concat(novas);
        _setStatus("<span style='color:#6a5a30'>"+todasOcs.length+(totalReal?"/"+totalReal:"")+" carregadas...</span>");

        // Pequena pausa para não sobrecarregar o Apps Script
        await new Promise(function(r){ setTimeout(r, 600); });
      }
    }

    // ── Deduplicar por ID ──
    const seen = new Set();
    state.db.ocorrencias = todasOcs.filter(function(o){
      const k = String(o.id).trim();
      if(seen.has(k)) return false;
      seen.add(k); return true;
    });

    salvarLocal();
    const n = state.db.ocorrencias.length;
    console.log("[BCS] carregamento concluído: "+n+" ocorrências únicas");
    showToast(n + " ocorrência(s) carregadas!");
    _setStatus("<span style='color:#6b8c42'>✓ "+n+" ocorrências · "+new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})+"</span>");

  } catch(e) {
    console.log("[BCS] erro:", e);
    _setStatus("<span style='color:#ef4444'>⚠ "+e.message+"</span>");
  } finally {
    _carregando = false;
  }
}

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let state = {
  perfil: null,
  tela: "dashboard",
  db: carregarLocal(),
  chatMsgs: [{role:"assistant",text:"Olá! Sou o Assistente da Central de Inteligências BCS 🛡\n\nPergunte sobre ocorrências, suspeitos, vítimas ou bairros."}],
  chatLoading: false,
  alertas: null,
  calMes: new Date(),
  calDia: null,
  charts: {},
  ultimaBusca: "",
  alertasGraves: JSON.parse(localStorage.getItem("bcs_alertas_graves")||"[]"),
  alertaDetalhe: null,
};

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
const hoje = () => new Date().toISOString().split("T")[0];
// Converte qualquer formato de data para objeto Date (global)
function parseData(s){
  if(!s) return null;
  const str=String(s).trim();
  const dt=new Date(str);
  if(!isNaN(dt)) return dt;
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(str)){const p=str.split("/");return new Date(p[2]+"-"+p[1]+"-"+p[0]+"T12:00");}
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)) return new Date(str+"T12:00");
  return null;
}
const agora = () => new Date().toTimeString().slice(0,5);
const norm=s=>(s||"").toLowerCase().trim().replace(/\s+/g," ");
function fmtData(d){if(!d)return"";const s=String(d).trim();if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;const m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[3]+"/"+m[2]+"/"+m[1];try{const dt=new Date(s);if(!isNaN(dt))return dt.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});}catch(e){}return s;}
function fmtHora(h){if(!h)return"";const m=String(h).match(/(\d{2}:\d{2})/);return m?m[1]:"";}
const id = prefix => `${prefix}-${Date.now()}-${Math.floor(Math.random()*1000)}`;

function showToast(msg, tipo="success") {
  const t = document.getElementById("toast");
  t.textContent = (tipo==="error"?"⚠ ":"✓ ") + msg;
  t.style.display = "block";
  t.style.background = tipo==="error"?"#ef4444":"#10b981";
  t.style.color = "#fff";
  setTimeout(()=>{ t.style.display="none"; }, 3000);
}

function tag(label, color) {
  return `<span class="tag" style="background:${color}18;color:${color}">${label}</span>`;
}

// ══════════════════════════════════════════════════
// SHEETS
// ══════════════════════════════════════════════════
function enviarSheets(tipo, registro) {
  if (!SHEETS_URL) return;
  try {
    const {texto_original, criadoEm, ...reg} = registro;
    const json = JSON.stringify({tipo, registro:reg});
    fetch(SHEETS_URL, {
      method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body: new URLSearchParams({dados:json}).toString(),
      mode:"no-cors"
    }).catch(()=>{});
  } catch(e) { console.log("Sheets:", e); }
}

// ══════════════════════════════════════════════════
// EXTRAÇÃO LOCAL
// ══════════════════════════════════════════════════
function extrairLocal(texto) {
  const get = (...patterns) => { for(const p of patterns){const m=texto.match(p);if(m)return(m[1]||"").trim();}return ""; };
  const tipo      = get(/^Tipo[\t: ]+(.+)$/im, /^Natureza[\t: ]+(.+)$/im);
  const dataStr   = get(/Data[\t: ]+(\d{2}\/\d{2}\/\d{4})/i);
  const hora      = get(/às\s+(\d{2}:\d{2})/i, /Hora[\t: ]+(\d{2}:\d{2})/i, /(\d{2}:\d{2})/);
  const bairro    = get(/bairro\s+([A-ZÀ-Ú][^,\n-]+?)(?:\s*,|\s*-\s*Zona)/i, /Local[\t: ]+[^\n]*,\s*([^,\n]+),/i);
  const municipio = get(/Município[\t: ]+([^\n\/]+)/i);
  const vitimaNome= get(/Tipo:\s*VÍTIMA\s+Nome:\s*([^\n,]+)/i, /👩\s*Vítima:\s*([^\n]+)/i, /Vítima\s+Nome:\s*([^\n,]+)/i);
  const vitimaSexo= /Sexo:\s*Masculino/i.test(texto)?"M":"F";
  const vitimaIdade=get(/(\d{1,2})\s*anos/i);
  const vitimaCPF = get(/([\d]{3}\.[\d]{3}\.[\d]{3}-[\d]{2})/);
  const vitimaTel = get(/📞\s*Telefone:\s*([^\n]+)/i, /Tel\.?\s*[:\s]*([\d][\d\s\-\.]{7,})/i);
  const vitimaEnd = get(/📍\s*Endereço:\s*([^\n]+)/i, /Endereço:\s*([^\n,\.]{5,})/i);
  const suspNome  = /Autor:\s*NÃO IDENTIFICADO/i.test(texto)?"Não identificado":get(/Autor:\s*([^\n]+)/i, /👤\s*Autor:\s*([^\n]+)/i);
  const veiculo   = get(/([A-Z]{3}[\-]?[0-9][A-Z0-9][0-9]{2}(?:\s*\([^\)]+\))?)/,/veículo[^,\n]*?([A-ZÀ-Ú][a-z]+\s+[A-Za-z]+[^,\n]*)/i);
  const mp        = /Medida Protetiva:\s*SIM/i.test(texto)?"Sim":"Não";
  const vd        = /violência doméstica/i.test(texto);
  const descricao = get(/Dinâmica dos fatos[\t: ]+([^\n]{10,})/i, /Descrição[\t: ]+([^\n]{10,})/i) || texto.slice(0,300);

  let dataISO = hoje();
  if(dataStr){const p=dataStr.split("/");if(p.length===3)dataISO=`${p[2]}-${p[1]}-${p[0]}`;}

  return {
    id:id("OC"), criadoEm:new Date().toISOString(),
    numero:"", data:dataISO, hora:hora||"", tipo:tipo||"Não identificado",
    bairro:bairro||"", municipio:municipio||"Vitória da Conquista",
    vitima_nome:vitimaNome||"", vitima_idade:vitimaIdade||"",
    vitima_sexo:vitimaSexo, vitima_telefone:vitimaTel||"",
    vitima_endereco:vitimaEnd||"", vitima_cpf:vitimaCPF||"",
    suspeito_nome:suspNome||"Não identificado", suspeito_apelido:"",
    suspeito_caracteristicas:"", veiculo:veiculo||"",
    medida_protetiva:mp, descricao:descricao||"",
    violencia_domestica:vd, requer_visita:vd,
    reincidente:false, texto_original:texto,
  };
}

// ══════════════════════════════════════════════════
// REINCIDÊNCIA
// ══════════════════════════════════════════════════
function verificarReincidencia(nova) {
  const hist = state.db.ocorrencias;
  const alertas = [];
  const sn = norm(nova.suspeito_nome);
  if (sn && sn!=="não identificado" && sn.length>2) {
    const found = hist.filter(o=>{ const oh=norm(o.suspeito_nome); return oh&&oh!=="não identificado"&&oh.split(" ")[0]===sn.split(" ")[0]; });
    if(found.length) alertas.push({tipo:"suspeito",cor:"#ef4444",icone:"🔴",titulo:"SUSPEITO REINCIDENTE",msg:`"${nova.suspeito_nome}" já consta em ${found.length} ocorrência(s).`,ocs:found});
  }
  const vp = norm(nova.vitima_nome).split(" ").filter(p=>p.length>2);
  if(vp.length>=2){
    const found = hist.filter(o=>{const vh=norm(o.vitima_nome);return vh&&vh.includes(vp[0])&&vh.includes(vp[vp.length-1]);});
    if(found.length) alertas.push({tipo:"vitima",cor:"#f97316",icone:"🟠",titulo:"VÍTIMA REINCIDENTE",msg:`"${nova.vitima_nome}" já registrada em ${found.length} ocorrência(s).`,ocs:found});
  }
  if(nova.veiculo&&nova.veiculo.length>3){
    const pm=nova.veiculo.match(/[A-Za-z]{3}[\-\s]?[0-9A-Za-z]{4,5}/);
    const placa=pm?norm(pm[0]).replace(/[\-\s]/g,""):null;
    const found = hist.filter(o=>{
      if(!o.veiculo)return false;
      if(placa){const pm2=o.veiculo.match(/[A-Za-z]{3}[\-\s]?[0-9A-Za-z]{4,5}/);const pl2=pm2?norm(pm2[0]).replace(/[\-\s]/g,""):null;if(pl2&&pl2===placa)return true;}
      return false;
    });
    if(found.length) alertas.push({tipo:"veiculo",cor:"#eab308",icone:"🟡",titulo:"VEÍCULO REGISTRADO",msg:`Veículo "${nova.veiculo}" já apareceu em ${found.length} ocorrência(s).`,ocs:found});
  }
  return alertas;
}

// ══════════════════════════════════════════════════
// SALVAR
// ══════════════════════════════════════════════════
function salvarOcorrencia(nova, reinc) {
  const final = {...nova, reincidente:reinc};
  state.db.ocorrencias.unshift(final);
  registrarAlertaGrave(final);
  enviarSheets("ocorrencias", final);
  salvarLocal();
  document.getElementById("paste-area").value = "";
  state.alertas = null;
  showToast("Ocorrência registrada e enviada para a planilha!");
  render();
}

function processarOcorrencia() {
  const txt = document.getElementById("paste-area")?.value||"";
  if(!txt.trim()){showToast("Cole o texto primeiro","error");return;}
  const nova = extrairLocal(txt);
  const alertas = verificarReincidencia(nova);
  if(alertas.length){state.alertas={nova,lista:alertas};render();}
  else salvarOcorrencia(nova,false);
}

async function enviarChat() {
  const inp = document.getElementById("chat-input");
  const pergunta = inp?.value?.trim();
  if(!pergunta||state.chatLoading)return;
  inp.value="";
  state.chatMsgs.push({role:"user",text:pergunta});
  state.chatLoading=true;
  renderChat();

  const system=`Você é o Assistente da Central de Inteligências BCS. Responda de forma objetiva em português.
DADOS (${new Date().toLocaleDateString("pt-BR")}):
Ocorrências: ${state.db.ocorrencias.length} | VD: ${state.db.ocorrencias.filter(o=>o.violencia_domestica).length} | Reincidentes: ${state.db.ocorrencias.filter(o=>o.reincidente).length} | Atendimentos: ${state.db.atendimentos.length} | Visitas: ${state.db.visitas.length}
OCORRÊNCIAS:
${state.db.ocorrencias.slice(0,20).map(o=>`[${o.data} ${o.hora}] ${o.tipo}|${o.bairro}|Vítima:${o.vitima_nome}(${o.vitima_idade}a ${o.vitima_sexo})Tel:${o.vitima_telefone}|Suspeito:${o.suspeito_nome}${o.suspeito_apelido?" ap."+o.suspeito_apelido:""}|${o.suspeito_caracteristicas}|Veíc:${o.veiculo}|VD:${o.violencia_domestica?"S":"N"}|MP:${o.medida_protetiva}${o.reincidente?" REINC":""}`).join("\n")||"Nenhuma."}`;

  try {
    const history = state.chatMsgs.filter((m,i)=>i>0).map(m=>({role:m.role,content:m.text}));
    let startIdx=0; while(startIdx<history.length&&history[startIdx].role==="assistant")startIdx++;
    const msgs=[...history.slice(startIdx)];

    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system,messages:msgs})
    });
    const rj = await res.json();
    const txt = (rj.content||[]).map(c=>c.text||"").join("")||"Não consegui processar.";
    state.chatMsgs.push({role:"assistant",text:txt});
  } catch(e) {
    state.chatMsgs.push({role:"assistant",text:"Erro de conexão. Verifique sua internet."});
  }
  state.chatLoading=false;
  renderChat();
}

// CALENDAR
// ══════════════════════════════════════════════════
function renderCalendar() {
  const cal = document.getElementById("cal-container");
  if(!cal) return;
  const mes=state.calMes, ano=mes.getFullYear(), mn=mes.getMonth();
  const nomeMes=mes.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const primeiro=new Date(ano,mn,1).getDay(), total=new Date(ano,mn+1,0).getDate();
  const hojeStr=hoje();
  const dStr=d=>`${ano}-${String(mn+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const getEvs=d=>({ags:state.db.agendamentos.filter(a=>a.data===dStr(d)),vis:state.db.visitas.filter(v=>v.data===dStr(d))});
  const sem=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <button class="btn btn-ghost" onclick="calNav(-1)" style="padding:8px 16px;font-size:16px">‹</button>
    <h3 style="color:#e8ddd0;font-size:17px;font-weight:700;text-transform:capitalize">${nomeMes}</h3>
    <button class="btn btn-ghost" onclick="calNav(1)" style="padding:8px 16px;font-size:16px">›</button>
  </div>
  <div style="background:#242214;border:1px solid #3a3820;border-radius:12px;overflow:hidden">
    <div class="cal-grid" style="background:#080400">`;
  sem.forEach(s=>{ html+=`<div class="cal-header-day">${s}</div>`; });
  html+=`</div><div class="cal-grid" style="gap:1px;background:#3a3820">`;
  for(let i=0;i<primeiro;i++) html+=`<div class="cal-day"></div>`;
  for(let d=1;d<=total;d++){
    const ds=dStr(d), ev=getEvs(d), isHoje=ds===hojeStr, isSel=state.calDia===d;
    const bg=isSel?"background:#1e1c12":isHoje?"background:#242214":"background:#141208";
    html+=`<div class="cal-day${isHoje?" today":""}${isSel?" selected":""}" style="${bg}" onclick="calClick(${d})">
      <div class="cal-num" style="color:${ev.ags.length||ev.vis.length?"#e8ddd0":"#3a3820"}">${d}</div>`;
    ev.ags.slice(0,2).forEach(a=>{ html+=`<div class="cal-event" style="background:${COR_VISITA[a.tipo]||"#c8a84b"};color:#000">${a.hora} ${a.vitima_nome.split(" ")[0]}</div>`; });
    ev.vis.slice(0,1).forEach(v=>{ html+=`<div class="cal-event" style="background:#334155;color:#94a3b8">✓ ${v.vitima_nome.split(" ")[0]}</div>`; });
    html+=`</div>`;
  }
  html+=`</div></div>`;

  if(state.calDia){
    const ev=getEvs(state.calDia);
    html+=`<div class="card" style="margin-top:14px"><h4 style="color:#e8ddd0;font-size:15px;font-weight:700;margin-bottom:12px">${String(state.calDia).padStart(2,"0")}/${String(mn+1).padStart(2,"0")}/${ano}</h4>`;
    if(!ev.ags.length&&!ev.vis.length) html+=`<p style="color:#3a3820;font-size:14px">Nenhum evento neste dia.</p>`;
    ev.ags.forEach(a=>{const c=COR_VISITA[a.tipo]||"#c8a84b";html+=`<div style="background:#141208;border-left:3px solid ${c};border-radius:8px;padding:12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:4px">${tag(a.tipo,c)}<span style="color:#7a7050;font-size:12px">${a.hora}</span></div><p style="color:#e8ddd0;font-size:14px;font-weight:500">${a.vitima_nome}</p>${a.endereco?`<p style="color:#7a7050;font-size:12px">📍 ${a.endereco}</p>`:""}</div>`;});
    ev.vis.forEach(v=>{html+=`<div style="background:#141208;border-left:3px solid #10b981;border-radius:8px;padding:12px;margin-bottom:8px">${tag("✓ Realizada","#10b981")}<p style="color:#e8ddd0;font-size:14px;font-weight:500;margin-top:6px">${v.vitima_nome}</p>${v.resultado?`<p style="color:#7a7050;font-size:12px;margin-top:4px">${v.resultado}</p>`:""}</div>`;});
    html+=`</div>`;
  }
  cal.innerHTML=html;
}

  const m=state.calMes;

      <p style="color:#a89860;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px">Google Sheets</p>
      <span style="background:#6b8c4222;color:#6b8c42;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">✓ CONECTADO</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"><button onclick="carregarDoSheets()" style="background:#1e2a14;border:1px solid #3a4a28;color:#6b8c42;padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600">↻ Sincronizar</button><button id="btn-dedup" onclick="deduplicarPlanilha()" style="background:#1a1808;border:1px solid #5a3a10;color:#c8601a;padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600">🧹 Remover Duplicatas</button></div>
    <div id="sheets-status" style="color:#4a4530;font-size:11px;margin-top:6px">Sincronização automática ativa.</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px">
    <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-val">${ocs.length}</div><div class="stat-label">Ocorrências</div></div>
    <div class="stat-card"><div class="stat-icon">🛡</div><div class="stat-val" style="color:#ef4444">${totalVD}</div><div class="stat-label">Violência Dom.</div></div>
    <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-val" style="color:#f97316">${totalReinc}</div><div class="stat-label">Reincidentes</div></div>
    <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-val" style="color:#b87333">${proxVis}</div><div class="stat-label">Vis. Agendadas</div></div>
    <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val" style="color:#10b981">${vis.length}</div><div class="stat-label">Vis. Realizadas</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px">
    <div class="card">
      <p style="color:#7a7050;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Ações</p>
      <button class="btn btn-gold btn-full" onclick="setTela('lancar')" style="margin-bottom:9px;text-align:left">+ Lançar Ocorrência</button>
      <button class="btn btn-ghost btn-full" onclick="abrirFormAgend();setTela('agendamentos')" style="margin-bottom:9px;text-align:left;color:#b87333;border-color:#b87333">📅 Agendar Visita</button>
      <button class="btn btn-ghost btn-full" onclick="abrirFormVisita();setTela('visitas')" style="margin-bottom:9px;text-align:left;color:#10b981;border-color:#10b981">✅ Registrar Visita</button>
      <button class="btn btn-ghost btn-full" onclick="abrirFormAtend();setTela('atendimentos')" style="text-align:left;color:#c4833a;border-color:#c4833a">📞 Atendimento Telefônico</button>
    </div>
    <div class="card">
      <p style="color:#7a7050;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Gerar Relatórios (IA)</p>
      <button class="btn btn-ghost btn-full" onclick="setTela('r_intel')" style="margin-bottom:9px;text-align:left;color:#ef4444;border-color:#ef4444">🔴 Relatório de Inteligência</button>
      <button class="btn btn-ghost btn-full" onclick="setTela('r_visitas')" style="margin-bottom:9px;text-align:left;color:#c8a84b;border-color:#c8a84b">💛 Relatório de Visitas Solidárias</button>
      <button class="btn btn-ghost btn-full" onclick="setTela('r_violencia')" style="text-align:left;color:#c4833a;border-color:#c4833a">🟣 Relatório de Vítimas de Violência</button>
    </div>
  </div>
  <div class="card">
    <p style="color:#7a7050;font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Últimas Ocorrências</p>
    ${!ocs.length?`<p style="color:#3a3820;text-align:center;padding:22px 0">Nenhuma ocorrência registrada ainda.</p>`:
    ocs.slice(0,5).map(o=>`<div style="display:flex;gap:10px;align-items:center;background:#141208;border-radius:8px;padding:10px 14px;margin-bottom:6px">
      ${tag((o.tipo||"—").split(" ")[0],o.violencia_domestica?"#ef4444":"#c8a84b")}
      <div style="flex:1;min-width:0"><p style="font-size:13px;color:#e8ddd0;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.vitima_nome||"Vítima não informada"} — ${o.bairro}</p><p style="font-size:11px;color:#4a4530">${o.data} ${o.hora}</p></div>
      ${o.reincidente?tag("⚠ REINC","#f97316"):""}
      ${o.violencia_domestica?`<span style="font-size:11px;color:#ef4444;font-weight:700">VD</span>`:""}
    </div>`).join("")}
  </div>`;
}

// FORM HELPERS
// ══════════════════════════════════════════════════
function abrirFormAtend(){ document.getElementById("form-atend")?.classList.remove("hidden"); }
function abrirFormAgend(){ document.getElementById("form-agend")?.classList.remove("hidden"); setTimeout(renderConceito,50); }
function abrirFormVisita(){ document.getElementById("form-visita")?.classList.remove("hidden"); }

function renderConceito(){
  const t=document.getElementById("ag-tipo")?.value;
  const d=document.getElementById("ag-conceito");
  if(d&&t) d.innerHTML=CONCEITO_VISITA[t]||"";
}

function salvarAtend(){
  const nome=document.getElementById("at-nome")?.value?.trim();
  if(!nome){showToast("Informe o nome","error");return;}
  const reg={id:id("AT"),criadoEm:new Date().toISOString(),data:document.getElementById("at-data").value,hora:document.getElementById("at-hora").value,nome,telefone:document.getElementById("at-tel").value,tipo:document.getElementById("at-tipo").value,descricao:document.getElementById("at-desc").value,encaminhamento:document.getElementById("at-encam").value};
  state.db.atendimentos.unshift(reg);
  enviarSheets("atendimentos",reg);
  salvarLocal();
  showToast("Atendimento registrado!");
  render();
}

function salvarAgend(){
  const nome=document.getElementById("ag-nome")?.value?.trim();
  if(!nome){showToast("Informe o nome","error");return;}
  const reg={id:id("AG"),criadoEm:new Date().toISOString(),data:document.getElementById("ag-data").value,hora:document.getElementById("ag-hora").value,tipo:document.getElementById("ag-tipo").value,vitima_nome:nome,endereco:document.getElementById("ag-end").value,responsavel:document.getElementById("ag-resp").value,objetivo:document.getElementById("ag-obj").value,status:document.getElementById("ag-status").value};
  state.db.agendamentos.unshift(reg);
  enviarSheets("agendamentos",reg);
  salvarLocal();
  showToast("Agendamento salvo!");
  render();
}

function salvarVisita(){
  const nome=document.getElementById("vi-nome")?.value?.trim();
  if(!nome){showToast("Informe o nome","error");return;}
  const reg={id:id("VS"),criadoEm:new Date().toISOString(),data:document.getElementById("vi-data").value,tipo:document.getElementById("vi-tipo").value,vitima_nome:nome,endereco:document.getElementById("vi-end").value,resultado:document.getElementById("vi-result").value,proxima_acao:document.getElementById("vi-prox").value};
  state.db.visitas.unshift(reg);
  enviarSheets("visitas",reg);
  salvarLocal();
  showToast("Visita registrada!");
  render();
}

function setTela(t){ state.tela=t; closeSidebar(); render(); }

function updateNavBtns(){
  document.querySelectorAll(".nav-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.tela===state.tela);
  });
}

function fazerLogin(tipo){
  const pin=document.getElementById("pin-input")?.value;
  const exp=tipo==="gestor"?GESTOR_PIN:OP_PIN;
  if(pin===exp){
    state.perfil=tipo;
    render();
    // Não recarregar do Sheets aqui para não sobrescrever os dados já carregados
  }
  else{const e=document.getElementById("pin-err");if(e)e.style.display="block";}
}

  });
  const ags=Array.from({length:4},(_,j)=>{const d=new Date();d.setDate(d.getDate()+j*3);return{id:`AG-${2000+j}`,data:d.toISOString().split("T")[0],hora:`0${8+j}:00`,tipo:TIPOS_VISITA[j%5],vitima_nome:nomes[j%nomes.length],endereco:bairros[j%6]+", Vitória da Conquista",responsavel:"Equipe BCS",objetivo:"Acompanhamento",status:"Agendado"};});
  return{ocorrencias:ocs,atendimentos:[],visitas:[],agendamentos:ags};
}

      b.style.color="#7a7050";
      b.style.fontWeight="400";
    }

function limparFiltro() {
  const inp = document.getElementById("filtro-input");
  if(inp) inp.value="";
  state.ultimaBusca="";
  const div = document.getElementById("filtro-resultado");
  if(div){ div.innerHTML=""; div.style.display="none"; }
}

function getFiltroRange() {
  const p = state.filtroPeriodo||"7d";
  const agora = new Date();
  let de = null;
  if(p==="hoje"){ de=new Date(hoje()+"T00:00:00"); }
  else if(p==="24h"){ de=new Date(agora-24*60*60*1000); }
  else if(p==="7d"){ de=new Date(agora-7*24*60*60*1000); }
  else if(p==="30d"){ de=new Date(agora-30*24*60*60*1000); }
  else if(p==="mes"){ de=new Date(agora.getFullYear(),agora.getMonth(),1); }
  else if(p==="custom"){
    const deVal=document.getElementById("filtro-de")?.value;
    const ateVal=document.getElementById("filtro-ate")?.value;
    return { de: deVal?new Date(deVal+"T00:00:00"):null, ate: ateVal?new Date(ateVal+"T23:59:59"):null };
  }
  return { de, ate: null };
}

function executarFiltro() {
  const q = (document.getElementById("filtro-input")?.value||"").toLowerCase().trim();
  state.ultimaBusca = q;
  const div = document.getElementById("filtro-resultado");
  if (!div) return;

  // Filtra por período
  const range = getFiltroRange();
  let ocs = state.db.ocorrencias.filter(o=>{
    const d = new Date((o.criadoEm||o.data+"T12:00"));
    if(range.de && d < range.de) return false;

    return true;

function toggleOcorrencia(id, card) {
  const det = document.getElementById(id);
  const arrow = document.getElementById("arrow-"+id);
  if (!det) return;
  const isOpen = det.style.display !== "none";
  det.style.display = isOpen ? "none" : "block";
  if(arrow) arrow.style.transform = isOpen ? "rotate(0deg)" : "rotate(180deg)";
  if(card) card.style.borderColor = isOpen ? "#3a3820" : "#c8a84b";
}

function gerarRecomendacoes() {
  const div = document.getElementById("rec-op-banner");
  if (!div) return;

  const ocs = state.db.ocorrencias;

  // Palavras que indicam recuperação
  const recuperado = o => {
    const txt = (o.tipo + " " + o.descricao).toLowerCase();
    return txt.includes("recuper") || txt.includes("localiz") || txt.includes("apreend");
  };

  // Veículos roubados, furtados ou usados em crimes — últimas 72h
  const h72 = new Date(new Date() - 72*60*60*1000);
  const veiculos = ocs.filter(o => {
    if (!o.veiculo) return false;
    const tipo = (o.tipo||"").toLowerCase();
    const desc = (o.descricao||"").toLowerCase();
    const naoRecuperado = !recuperado(o);
    const naoEhRecuperacao = !tipo.includes("recuper");
    const dataReal = o.data ? parseData(o.data) : new Date(o.criadoEm);
    const recente = !isNaN(dataReal) && dataReal >= h72;
    const roubouOuFurtou = tipo.includes("roubo") || tipo.includes("furto");
    const usadoEmCrime = desc.includes("veículo") || desc.includes("veiculo") || 
                         desc.includes("moto") || desc.includes("automóvel") ||
                         tipo.includes("homicídio") || tipo.includes("latrocínio") ||
                         tipo.includes("tráfico") || tipo.includes("assalto");
    return recente && naoEhRecuperacao && naoRecuperado && (roubouOuFurtou || usadoEmCrime);
  });

  // Remove duplicatas de placa/veículo
  const veiculosUnicos = [];
  const placasVistas = new Set();
  veiculos.forEach(o => {
    const chave = o.veiculo.toLowerCase().replace(/[\s\-]/g,"");
    if (!placasVistas.has(chave)) {
      placasVistas.add(chave);
      veiculosUnicos.push(o);
    }
  });

  if (veiculosUnicos.length === 0) {
    div.innerHTML = `
    <div style="background:linear-gradient(135deg,#121a0a,#101408);border:1px solid #2a4a1a;border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:12px">
      <span style="font-size:20px">✅</span>
      <div>
        <p style="color:#6a8a50;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">Alertas de Veículos</p>
        <p style="color:#4a6a30;font-size:13px">Nenhum veículo com restrição ativo no momento.</p>
      </div>
    </div>`;
    return;
  }

  div.innerHTML = `
  <div style="background:linear-gradient(135deg,#1e1500,#1a1200);border:1px solid #6a5010;border-radius:14px;overflow:hidden">
    <div style="background:linear-gradient(90deg,#2a1e08,#1e1500);padding:12px 18px;border-bottom:1px solid #4a3808;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="width:8px;height:8px;border-radius:50%;background:#e8b830;display:inline-block;animation:pulse 2s infinite"></span>
        <span style="color:#d4a830;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase">🚗 Veículos — Alerta Operacional 72h</span>
      </div>

const TIPOS_GRAVES=["roubo","furto","homicídio","homicidio","tentativa de homicídio","latrocínio","estupro","sequestro","tráfico","trafico","ameaça","maria da penha","violência doméstica","medida protetiva","feminicídio"];

  const txt=((oc.tipo||"")+" "+(oc.descricao||"")+" "+(oc.medida_protetiva==="Sim"?"medida protetiva":"")).toLowerCase();
  return TIPOS_GRAVES.some(function(t){return txt.includes(t);});

// ── Cache de geocodificação ──────────────────────────
const _geoCache = (function(){
  try{ return JSON.parse(localStorage.getItem("bcs_geo_cache")||"{}"); }catch(e){ return {}; }
})();
function _salvarGeoCache(){ try{ localStorage.setItem("bcs_geo_cache", JSON.stringify(_geoCache)); }catch(e){} }

async function _geocodificar(endereco, cidade){
  const chave = (endereco+"|"+cidade).toLowerCase().trim();
  if(_geoCache[chave]) return _geoCache[chave];
  try{
    const q = encodeURIComponent(endereco+", "+cidade+", Bahia, Brasil");
    const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+q;
    const r = await fetch(url, {headers:{"Accept-Language":"pt-BR","User-Agent":"BCS-Vigilia/1.0"}});
    const data = await r.json();
    if(data && data[0]){
      const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
      _geoCache[chave] = coords;
      _salvarGeoCache();
      return coords;
    }
  }catch(e){}
  return null;
}

function _corTipo(tipo, descricao){
  const t = ((tipo||"")+" "+(descricao||"")).toLowerCase();
  if(/homicídio|homicidio|latrocínio|feminicídio|feminicidio/.test(t)) return "#ef4444";
  if(/tentativa de homicídio|tentativa/.test(t)) return "#f97316";
  if(/roubo/.test(t)) return "#f97316";
  if(/furto/.test(t)) return "#eab308";
  if(/violência doméstica|violencia domestica|maria da penha/.test(t)) return "#a855f7";
  if(/tráfico|trafico/.test(t)) return "#06b6d4";
  if(/lesão|lesao|ameaça|ameaca/.test(t)) return "#10b981";
  return "#c8a84b";
}

    let coords = null;

    // Tenta geocodificar pelo endereço
    if(o.vitima_endereco && o.vitima_endereco.trim().length > 5){
      coords = await _geocodificar(o.vitima_endereco, CIDADE);
      if(coords) geocodificados++;
      await delay(1100); // respeita 1 req/s do Nominatim
    }

    // Fallback: centro do bairro com offset aleatório para não empilhar
    if(!coords){
      const bNome = matchB(o.bairro);
      if(bNome && BAIRROS[bNome]){
        const base = BAIRROS[bNome];
        coords = [base[0]+(Math.random()-0.5)*0.004, base[1]+(Math.random()-0.5)*0.004];
        fallbacks++;
      }
    }

    if(!coords) continue;

    // Verifica se mapa ainda existe (usuário pode ter trocado de tela)
    if(!window._mapa || window._mapa !== mapa) break;

    const tam = 14;
    const marker = L.marker(coords, {icon:_iconeOc(cor, tam)}).addTo(mapa);
    marker.bindPopup(_popupOc(o, cor), {maxWidth:240});
  }
  console.log("[BCS] Mapa: "+geocodificados+" geocodificados, "+fallbacks+" por bairro");
}

// WHATSAPP PARSER
// ══════════════════════════════════════════════
function parsearWhatsApp(texto){
  const linhas=texto.split("\n"),msgs=[];let msgAtual=null;
  const rN=/^\[(\d{2}\/\d{2}\/\d{4}),\s*(\d{2}:\d{2})(?::\d{2})?\]\s*([^:]+):\s*(.*)$/;
  const rV=/^(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})\s+-\s+([^:]+):\s*(.*)$/;
  for(const l of linhas){
    const m=l.match(rN)||l.match(rV);
    if(m){if(msgAtual)msgs.push(msgAtual);msgAtual={data:m[1],hora:m[2],contato:m[3].trim(),texto:m[4]};}
    else if(msgAtual)msgAtual.texto+="\n"+l;
  }
  if(msgAtual)msgs.push(msgAtual);
  return msgs;
}
function ehMensagemOcorrencia(msg){
  const txt=msg.texto.toLowerCase();
  if(msg.texto.includes("<Mídia oculta>")||msg.texto.includes("Mensagem apagada")||msg.texto.trim().length<30)return false;
  return["ocorrência","ocorrencia","b.o.","acionamento","viatura","pm","polícia","roubo","furto","homicídio","homicidio","lesão","lesao","ameaça","ameaca","tráfico","trafico","vítima","vitima","suspeito","autor","fuga","abordagem","maria da penha","medida protetiva","violência","violencia","bairro"].some(function(p){return txt.includes(p);});
}
function inferirTipoWpp(texto){
  const t=texto.toLowerCase();
  if(/homicídio|homicidio/.test(t))return"Homicídio";
  if(/tentativa de homicídio/.test(t))return"Tentativa de Homicídio";
  if(/latrocínio/.test(t))return"Latrocínio";
  if(/estupro/.test(t))return"Estupro";
  if(/violência doméstica|maria da penha/.test(t))return"Violência Doméstica";
  if(/medida protetiva/.test(t))return"Medida Protetiva";
  if(/roubo/.test(t))return"Roubo";
  if(/furto/.test(t))return"Furto";
  if(/tráfico|trafico/.test(t))return"Tráfico de Drogas";
  if(/lesão|lesao/.test(t))return"Lesão Corporal";
  if(/ameaça|ameaca/.test(t))return"Ameaça";
  return"Acionamento via WhatsApp";
}
function extrairOcorrenciaWpp(msg){
  const txt=msg.texto;
  const get=function(){for(var i=0;i<arguments.length;i++){var m=txt.match(arguments[i]);if(m)return(m[1]||"").trim();}return"";};
  const p=msg.data.split("/");
  const dataISO=p.length===3?p[2]+"-"+p[1]+"-"+p[0]:hoje();
  const tipo=get(/(?:natureza|tipo|crime)[:\s]+([^\n.]{3,60})/i)||inferirTipoWpp(txt);
  const bairro=get(/(?:bairro)\s+([A-ZÀ-Úa-zà-ú][\w\s]{2,30}?)(?:\s*[,.\-]|$)/im,/📍\s*([^\n,]+)/i);
  const vitimaNome=get(/(?:vítima|vitima)[:\s]+([A-ZÀ-Ú][a-zà-ú]+(?:\s+[A-ZÀ-Ú][a-zà-ú]+)+)/i);
  const vitimaTel=get(/(?:tel|fone|contato)[:\s.]*([0-9][0-9\s\-\.]{8,})/i);
  const suspNome=get(/(?:suspeito|autor)[:\s]+([A-ZÀ-Úa-zà-ú][^\n,]{3,50})/i)||"Não identificado";
  const suspCaract=get(/(?:características|vestindo|portando)[:\s]+([^\n.]{5,100})/i);
  const veiculo=get(/([A-Z]{3}[\-]?[0-9][A-Z0-9][0-9]{2})/,/(?:moto|veículo|veiculo|carro)[:\s]+([^\n,]{3,50})/i);
  const vd=/violência doméstica|maria da penha|medida protetiva/i.test(txt);
  return{id:id("OC"),criadoEm:new Date().toISOString(),numero:"",data:dataISO,hora:msg.hora,tipo:tipo||"Ocorrência via WhatsApp",bairro:bairro||"",municipio:"Vitória da Conquista",vitima_nome:vitimaNome||"",vitima_idade:"",vitima_sexo:"F",vitima_telefone:vitimaTel||"",vitima_endereco:"",vitima_cpf:"",suspeito_nome:suspNome,suspeito_apelido:"",suspeito_caracteristicas:suspCaract||"",veiculo:veiculo||"",medida_protetiva:/medida protetiva/i.test(txt)?"Sim":"Não",violencia_domestica:vd,requer_visita:vd,reincidente:false,descricao:txt.trim().slice(0,500),texto_original:txt};
}
let wppState={msgs:[],ocorrencias:[],step:"idle",processando:false};
function abrirUploadWpp(){state.tela="wpp_upload";wppState={msgs:[],ocorrencias:[],step:"idle",processando:false};render();}
function processarArquivoWpp(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const msgs=parsearWhatsApp(e.target.result);
    const ocMsgs=msgs.filter(ehMensagemOcorrencia);
    wppState={msgs:ocMsgs,ocorrencias:ocMsgs.map(extrairOcorrenciaWpp),step:"revisao",processando:false};
    renderTelaWpp();
  };
  reader.readAsText(file,"UTF-8");
}
function toggleWppOc(idx){
  const det=document.getElementById("wpp-det-"+idx);if(!det)return;
  const aberto=det.style.display!=="none";

async function importarWppSelecionados(){
  if(wppState.processando)return;
  wppState.processando=true;
  const sel=wppState.ocorrencias.filter(function(_,i){const c=document.getElementById("wpp-chk-"+i);return c&&c.checked;});
  if(!sel.length){showToast("Selecione ao menos uma ocorrência","error");wppState.processando=false;return;}
  const btn=document.getElementById("btn-importar-wpp");
  if(btn)btn.innerHTML="<span class='spin' style='width:14px;height:14px;border-width:2px'></span> Importando...";
  let n=0;
  for(const oc of sel){
    const alertas=verificarReincidencia(oc);
    const final=Object.assign({},oc,{reincidente:alertas.some(function(a){return a.tipo==="suspeito"||a.tipo==="vitima";})});
    state.db.ocorrencias.unshift(final);
    registrarAlertaGrave(final);
    enviarSheets("ocorrencias",final);
    n++;
    await new Promise(function(r){setTimeout(r,200);});
  }
  salvarLocal();
  wppState.step="concluido";wppState.importadas=n;
  renderTelaWpp();
  showToast(n+" ocorrência(s) importadas!");
}
